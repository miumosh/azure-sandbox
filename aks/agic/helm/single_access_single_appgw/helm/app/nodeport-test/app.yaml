---
# App A: NodePort routing — AppGW → Node IP:NodePort → kube-proxy DNAT → Pod
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-nodeport-html
  namespace: default
data:
  index.html: |
    <html><body>
      <h1>NodePort App</h1>
      <p>Route: AppGW -&gt; Node IP:NodePort -&gt; kube-proxy DNAT -&gt; Pod</p>
    </body></html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-nodeport
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-nodeport
  template:
    metadata:
      labels:
        app: app-nodeport
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: app-nodeport-html
---
apiVersion: v1
kind: Service
metadata:
  name: app-nodeport-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app: app-nodeport
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
