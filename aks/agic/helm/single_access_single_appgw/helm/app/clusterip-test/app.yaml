---
# App B: ClusterIP routing — AppGW → Pod IP direct (via Route Table) → Pod
# Requires AGIC v1.9.1+ and Route Table association on appgw-subnet
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-clusterip-html
  namespace: default
data:
  index.html: |
    <html><body>
      <h1>ClusterIP App</h1>
      <p>Route: AppGW -&gt; Pod IP direct (Route Table) -&gt; Pod (192.168.x.x)</p>
    </body></html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-clusterip
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-clusterip
  template:
    metadata:
      labels:
        app: app-clusterip
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: app-clusterip-html
---
apiVersion: v1
kind: Service
metadata:
  name: app-clusterip-svc
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: app-clusterip
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
