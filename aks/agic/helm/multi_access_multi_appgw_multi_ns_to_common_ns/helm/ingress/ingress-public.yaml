---
# Ingress for Public AppGW
# インターネット (ローカル PC) からアクセスされる
# host: public.example.com (DNS 未設定の場合は -H "Host:" ヘッダーで指定)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echoserver-public-ingress
  namespace: common-apps
  annotations:
    # agic-public が監視する ingressClass 値。
    # agic-public は watchNamespace: "common-apps" で本 Namespace を監視する。
    kubernetes.io/ingress.class: azure/application-gateway-public
spec:
  rules:
    - host: public.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echoserver-svc
                port:
                  number: 80
